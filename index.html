<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OneInTen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            --gold: #d4af37;
            --gold-light: #f3e0a4;
            --dark-bg: #0a0a0a;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Cormorant Garamond', 'Segoe UI', 'Georgia', serif;
            background-color: #0c0704;
            overflow: hidden;
            position: fixed;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('1.jfif') center/cover no-repeat fixed;
            filter: brightness(0.55) contrast(1.1);
            z-index: -2;
            pointer-events: none;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0,0,0,0.6), rgba(0,0,0,0.85));
            z-index: -1;
            pointer-events: none;
        }

        .game-header {
            padding: 0.8rem 2rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.5);
            z-index: 20;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1), opacity 0.3s;
            position: relative;
        }

        .header-hidden {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }

        .title-area h1 {
            font-size: 1.4rem;
            font-weight: 500;
            letter-spacing: 3px;
            color: var(--gold-light);
            text-shadow: 0 2px 5px #00000055;
        }

        .stats {
            display: flex;
            gap: 1.2rem;
            background: rgba(0, 0, 0, 0.5);
            padding: 0.3rem 1.2rem;
            border-radius: 3rem;
        }

        .stat-badge {
            font-family: monospace;
            font-size: 0.95rem;
            color: #ffecb3;
        }

        .stat-badge span {
            font-weight: bold;
            font-size: 1.3rem;
            color: var(--gold);
        }

        .attempts-badge {
            background: #1f1a0e;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            font-family: monospace;
            font-weight: bold;
            color: #f5cd7a;
            border-left: 3px solid var(--gold);
        }

        .countdown {
            font-family: 'Courier New', monospace;
            background: #00000066;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            color: #ead7ae;
        }

        .main-game-area {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: calc(100vh - 80px);
            overflow-x: visible;
            overflow-y: hidden;
        }

        .cards-horizontal-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            overflow-x: visible;
            padding: 0 20px;
        }

        .cards-grid {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            flex-wrap: nowrap;
            width: auto;
            max-width: 100%;
            padding: 0.5rem;
        }

        .card {
            width: 190px;
            height: 260px;
            background: url('2.jfif') center/cover no-repeat;
            background-color: #222;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            border: 1px solid rgba(212, 175, 55, 0.6);
            box-shadow: 0 20px 28px -12px black;
            position: relative;
            flex-shrink: 0;
        }

        .card:hover:not(.flipped) {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--gold);
            box-shadow: 0 28px 35px -10px rgba(0,0,0,0.7);
        }

        .card.flipped {
            cursor: default;
            border-color: #b48b3a;
            opacity: 0.85;
        }

        .card.flipped::after {
            content: "✓";
            position: absolute;
            bottom: 12px;
            right: 16px;
            background: var(--gold);
            color: black;
            width: 32px;
            height: 32px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .card .card-number-display {
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(12px);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--gold-light);
            font-family: monospace;
        }

        .card:not(.flipped) .card-number-display {
            display: none;
        }

        .card:not(.flipped)::before {
            content: "?";
            position: absolute;
            font-size: 3.2rem;
            background: rgba(0,0,0,0.55);
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 60px;
            backdrop-filter: blur(5px);
            color: #ffdd99;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            font-weight: bold;
        }

        .custom-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(20px);
            color: #ffecb3;
            padding: 12px 28px;
            border-radius: 60px;
            font-family: monospace;
            font-size: 1rem;
            z-index: 10050;
            transition: all 0.2s ease;
            opacity: 0;
            pointer-events: none;
            border-left: 4px solid var(--gold);
            white-space: nowrap;
        }
        .custom-toast.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        .modal-confirm {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(16px);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.25s ease;
        }

        .modal-confirm.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-card {
            background: linear-gradient(145deg, #201a14, #110d09);
            border-radius: 56px;
            padding: 2rem;
            max-width: 380px;
            width: 85%;
            text-align: center;
            border: 1px solid var(--gold);
        }

        .modal-card p {
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
            color: #fbeccd;
        }

        .attempt-counter {
            font-size: 0.85rem;
            background: #00000077;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            margin-bottom: 1rem;
            color: #eac77b;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .modal-btn {
            padding: 0.7rem 1.5rem;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }
        .modal-btn.confirm { background: var(--gold); color: #1f1309; }
        .modal-btn.cancel { background: #2c241e; color: #ffe3ae; border: 1px solid #866f42; }

        .scratch-fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #030201;
            z-index: 10000;
            display: none;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }

        .scratch-fullscreen.active { display: flex; }

        .scratch-inner {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1e1a15, #020100);
        }

        .prize-number-container {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        .prize-number {
            font-size: clamp(4rem, 22vw, 22rem);
            font-weight: 800;
            font-family: monospace;
            color: #d4af37;
            text-shadow: 0 0 15px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.5);
            padding: 0.2em 0.7em;
            border-radius: 80px;
            backdrop-filter: blur(12px);
            letter-spacing: 8px;
            opacity: 0.55;
            filter: blur(4px);
            transition: opacity 0.4s, filter 0.4s;
        }

        .scratch-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: url('https://cur.cursors-4u.net/others/oth-7/oth644.cur'), grabbing;
            transition: opacity 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 20;
            touch-action: none;
            background: transparent;
        }

        .close-full {
            position: fixed;
            top: 25px;
            right: 28px;
            width: 48px;
            height: 48px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #ffdead;
            border: 1px solid #c6a152;
            cursor: pointer;
            z-index: 10005;
            transition: 0.2s;
        }
        .close-full:hover {
            background: #d99e42;
            color: #1c130b;
        }

        .instruction-text {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: rgba(240, 215, 150, 0.85);
            font-size: 1rem;
            letter-spacing: 2px;
            font-family: monospace;
            pointer-events: none;
            z-index: 30;
            text-shadow: 0 1px 2px black;
            background: rgba(0,0,0,0.4);
            padding: 6px 0;
            backdrop-filter: blur(4px);
        }

        @media (max-width: 1300px) {
            .cards-grid { gap: 1.5rem; }
            .card { width: 170px; height: 235px; }
        }
        @media (max-width: 1000px) {
            .cards-grid { gap: 1.2rem; }
            .card { width: 150px; height: 210px; }
        }
        @media (max-width: 800px) {
            .cards-grid { gap: 1rem; }
            .card { width: 135px; height: 190px; }
            .game-header { padding: 0.5rem 1rem; flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 8px; }
        }
        @media (max-width: 650px) {
            .cards-grid { gap: 0.9rem; }
            .card { width: 115px; height: 165px; border-radius: 20px; }
        }

        @keyframes elegantShuffle {
            0% { transform: rotate(0deg) translateY(0px); }
            30% { transform: rotate(2deg) translateX(-8px) translateY(-5px); }
            70% { transform: rotate(-1deg) translateX(8px) translateY(-3px); }
            100% { transform: rotate(0deg) translateX(0px) translateY(0px); }
        }
    </style>
</head>
<body>

    <header class="game-header" id="gameHeader">
        <div class="title-area"><h1>OneInTen</h1></div>
        <div class="stats">
            <div class="stat-badge"><span id="openedCount">0</span>/<span id="totalCards">7</span></div>
            <div class="stat-badge">✧ <span id="remainingCount">7</span> rest.</div>
            <div class="attempts-badge" id="attemptsDisplay">Intentos: 3/3</div>
        </div>
        <div class="countdown" id="countdownTimer">próximo: --</div>
    </header>

    <div class="main-game-area">
        <div class="cards-horizontal-wrapper">
            <div class="cards-grid" id="cardsGrid"></div>
        </div>
    </div>

    <div id="confirmModal" class="modal-confirm">
        <div class="modal-card">
            <div class="attempt-counter" id="modalAttemptCounter">Intentos restantes: 3</div>
            <p>🔎 Elegí una carta<br>Raspá para revelar el número oculto</p>
            <div class="modal-buttons">
                <button id="confirmYesBtn" class="modal-btn confirm">✨ Raspar</button>
                <button id="confirmNoBtn" class="modal-btn cancel">🔄 Otra carta</button>
            </div>
        </div>
    </div>

    <div id="customToast" class="custom-toast"></div>

    <div id="scratchFullscreen" class="scratch-fullscreen">
        <div class="close-full" id="closeScratchBtn">✕</div>
        <div class="scratch-inner">
            <div class="prize-number-container">
                <div id="prizeNumberDisplay" class="prize-number">??</div>
            </div>
            <canvas id="scratchCanvas" class="scratch-canvas"></canvas>
            <div class="instruction-text">🎵 DESLIZA MIENTRAS MANTENGAS PRESIONADO - SONIDO ACTIVO 🎵</div>
        </div>
    </div>

    <script>
        // ---------- CONFIGURACIÓN JUEGO ----------
        const TOTAL_CARDS = 7;
        const MAX_NUM = 10;
        const STORAGE_NUMBERS = "magic7_cards_numbers";
        const STORAGE_FLIPPED = "magic7_cards_flipped";
        const STORAGE_LAST_DATE = "magic7_cards_lastDate";
        const STORAGE_LAST_CARD_IDX = "magic7_cards_lastIdx";
        const STORAGE_ATTEMPTS = "magic7_attempts_today";

        let cardNumbers = [];
        let flippedState = [];
        let lastFlipDate = null;
        let lastFlippedIndex = -1;
        let remainingAttempts = 3;

        let currentScratchCardIndex = null;
        let scratchCtx = null;
        let scratchCanvasElem = null;
        let isDrawing = false;
        let autoRevealed = false;
        let fadeTimeout = null;

        // ========== NUEVO SISTEMA DE AUDIO CON ARCHIVO 0424.MP3 ==========
        // SOLO SE REPRODUCE MIENTRAS EL USUARIO MANTIENE EL CLIC / DEDO PRESIONADO
        let customAudioContext = null;
        let customAudioBuffer = null;
        let currentSource = null;
        let isAudioPlaying = false;
        let audioInitialized = false;

        // Precarga del audio 0424.MP3 (mismo directorio que el HTML)
        async function initCustomScratchAudio() {
            try {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                if (!AudioContextClass) return false;
                
                if (customAudioContext && customAudioContext.state !== 'closed') {
                    // Si ya existe, solo reiniciamos el estado si es necesario
                    return true;
                }
                
                customAudioContext = new AudioContextClass();
                
                // Cargar el archivo 0424.MP3 desde la misma carpeta (sin ruta adicional)
                const response = await fetch('0424.MP3');
                if (!response.ok) {
                    console.warn("No se pudo cargar 0424.MP3, asegúrate que el archivo existe junto al HTML.");
                    return false;
                }
                const arrayBuffer = await response.arrayBuffer();
                customAudioBuffer = await customAudioContext.decodeAudioData(arrayBuffer);
                return true;
            } catch(e) {
                console.warn("Error al cargar audio personalizado:", e);
                return false;
            }
        }

        // Reproducir sonido en loop mientras se raspa (solo si está presionado)
        function startScratchCustomSound() {
            if (!customAudioContext || !customAudioBuffer) return;
            if (isAudioPlaying) return; // ya está sonando
            
            try {
                // Asegurar que el contexto está activo
                if (customAudioContext.state === 'suspended') {
                    customAudioContext.resume();
                }
                
                // Crear nueva fuente
                currentSource = customAudioContext.createBufferSource();
                currentSource.buffer = customAudioBuffer;
                currentSource.loop = true;  // Repite el audio mientras se raspa
                currentSource.loopStart = 0;
                currentSource.loopEnd = customAudioBuffer.duration;
                
                const gainNode = customAudioContext.createGain();
                gainNode.gain.value = 0.65; // Volumen moderado para raspado
                
                currentSource.connect(gainNode);
                gainNode.connect(customAudioContext.destination);
                currentSource.start();
                isAudioPlaying = true;
            } catch(e) {
                console.warn("Error al reproducir audio:", e);
            }
        }

        function stopScratchCustomSound() {
            if (!isAudioPlaying) return;
            try {
                if (currentSource) {
                    currentSource.stop();
                    currentSource.disconnect();
                    currentSource = null;
                }
            } catch(e) { /* ignore */ }
            isAudioPlaying = false;
        }

        // Función para inicializar el audio al primer contacto del usuario (requisito de autoplay)
        let audioUnlocked = false;
        function unlockAudioOnFirstInteraction() {
            if (audioUnlocked) return Promise.resolve(true);
            if (customAudioContext && customAudioContext.state === 'suspended') {
                return customAudioContext.resume().then(() => {
                    audioUnlocked = true;
                    return true;
                }).catch(() => false);
            }
            audioUnlocked = true;
            return Promise.resolve(true);
        }

        // ---------- Funciones auxiliares del juego ----------
        function showCustomMessage(msg, isError = false) {
            const toast = document.getElementById("customToast");
            toast.innerText = msg;
            toast.style.background = isError ? "rgba(80, 20, 10, 0.95)" : "rgba(0,0,0,0.92)";
            toast.style.borderLeftColor = isError ? "#ff8c5a" : "#d4af37";
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 2700);
        }

        function getTodayDate() {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }

        function generateUniqueRandomNumbers(count, maxVal) {
            const available = Array.from({ length: maxVal }, (_, i) => i + 1);
            for (let i = available.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [available[i], available[j]] = [available[j], available[i]];
            }
            return available.slice(0, count);
        }

        function saveToLocalStorage() {
            localStorage.setItem(STORAGE_NUMBERS, JSON.stringify(cardNumbers));
            localStorage.setItem(STORAGE_FLIPPED, JSON.stringify(flippedState));
            if (lastFlipDate) localStorage.setItem(STORAGE_LAST_DATE, lastFlipDate);
            else localStorage.removeItem(STORAGE_LAST_DATE);
            if (lastFlippedIndex !== -1) localStorage.setItem(STORAGE_LAST_CARD_IDX, JSON.stringify(lastFlippedIndex));
            else localStorage.removeItem(STORAGE_LAST_CARD_IDX);
            localStorage.setItem(STORAGE_ATTEMPTS, JSON.stringify({ attempts: remainingAttempts, date: getTodayDate() }));
        }

        function loadAttempts() {
            const stored = localStorage.getItem(STORAGE_ATTEMPTS);
            if (stored) {
                try {
                    const data = JSON.parse(stored);
                    if (data.date === getTodayDate()) remainingAttempts = data.attempts;
                    else remainingAttempts = 3;
                } catch(e) { remainingAttempts = 3; }
            } else remainingAttempts = 3;
            if (remainingAttempts > 3) remainingAttempts = 3;
            if (remainingAttempts < 0) remainingAttempts = 0;
            updateAttemptsDisplay();
        }

        function updateAttemptsDisplay() {
            const disp = document.getElementById("attemptsDisplay");
            if (disp) disp.innerText = `🎴 Intentos: ${remainingAttempts}/3`;
            const modalCounter = document.getElementById("modalAttemptCounter");
            if (modalCounter) modalCounter.innerText = `Intentos restantes hoy: ${remainingAttempts}`;
        }

        function consumeAttempt() {
            if (remainingAttempts > 0) { remainingAttempts--; updateAttemptsDisplay(); saveToLocalStorage(); return true; }
            return false;
        }
        function canMakeAttempt() { return remainingAttempts > 0 && !isTodayFlipUsed(); }

        function initializeFreshGame() {
            cardNumbers = generateUniqueRandomNumbers(TOTAL_CARDS, MAX_NUM);
            flippedState = new Array(TOTAL_CARDS).fill(false);
            lastFlipDate = null;
            lastFlippedIndex = -1;
            saveToLocalStorage();
        }

        function loadFromLocalStorage() {
            const storedNumbers = localStorage.getItem(STORAGE_NUMBERS);
            const storedFlipped = localStorage.getItem(STORAGE_FLIPPED);
            const storedDate = localStorage.getItem(STORAGE_LAST_DATE);
            const storedLastIdx = localStorage.getItem(STORAGE_LAST_CARD_IDX);
            if (storedNumbers && storedFlipped) {
                try {
                    cardNumbers = JSON.parse(storedNumbers);
                    flippedState = JSON.parse(storedFlipped);
                    if (cardNumbers.length !== TOTAL_CARDS || flippedState.length !== TOTAL_CARDS) throw new Error();
                    const uniqueSet = new Set(cardNumbers);
                    if (uniqueSet.size !== TOTAL_CARDS) throw new Error();
                } catch(e) { initializeFreshGame(); return; }
                lastFlipDate = storedDate || null;
                lastFlippedIndex = (storedLastIdx !== null) ? JSON.parse(storedLastIdx) : -1;
            } else { initializeFreshGame(); }
        }

        function isGameComplete() { return flippedState.every(v => v === true); }
        function isTodayFlipUsed() { return lastFlipDate === getTodayDate(); }

        function updateUI() {
            const totalFlipped = flippedState.filter(v => v === true).length;
            document.getElementById("openedCount").innerText = totalFlipped;
            document.getElementById("remainingCount").innerText = TOTAL_CARDS - totalFlipped;
        }

        function renderBoard() {
            const gridContainer = document.getElementById("cardsGrid");
            gridContainer.innerHTML = "";
            updateUI();
            for (let i = 0; i < TOTAL_CARDS; i++) {
                const cardDiv = document.createElement("div");
                cardDiv.className = "card";
                if (flippedState[i]) {
                    cardDiv.classList.add("flipped");
                    const spanNum = document.createElement("div");
                    spanNum.className = "card-number-display";
                    spanNum.innerText = cardNumbers[i];
                    cardDiv.appendChild(spanNum);
                } else {
                    const placeholder = document.createElement("div");
                    placeholder.style.display = "none";
                    cardDiv.appendChild(placeholder);
                    cardDiv.addEventListener("click", (e) => {
                        e.stopPropagation();
                        if (!flippedState[i] && !isGameComplete()) openConfirmModal(i);
                    });
                }
                gridContainer.appendChild(cardDiv);
            }
        }

        let pendingCardIdx = null;
        function openConfirmModal(cardIdx) {
            if (isGameComplete()) { showCustomMessage("🏆 Ya completaste todas las cartas.", false); return; }
            if (isTodayFlipUsed()) { showCustomMessage("⛅ Ya usaste tu giro de hoy. Vuelve mañana.", true); return; }
            if (!canMakeAttempt()) { showCustomMessage("❌ No te quedan más intentos para elegir cartas hoy.", true); return; }
            if (flippedState[cardIdx]) return;
            pendingCardIdx = cardIdx;
            updateAttemptsDisplay();
            document.getElementById("confirmModal").classList.add("active");
        }

        function closeConfirmModal() { document.getElementById("confirmModal").classList.remove("active"); pendingCardIdx = null; }

        // --- Funciones de raspado con audio personalizado (SOLO mientras se presiona) ---
        async function startScratchExperience(cardIdx) {
            if (flippedState[cardIdx] || isTodayFlipUsed() || !canMakeAttempt()) return;
            currentScratchCardIndex = cardIdx;
            const hiddenNumber = cardNumbers[cardIdx];
            const numberDisplay = document.getElementById("prizeNumberDisplay");
            numberDisplay.innerText = hiddenNumber;
            numberDisplay.style.opacity = "0.35";
            numberDisplay.style.filter = "blur(8px)";
            
            document.getElementById("gameHeader").classList.add("header-hidden");
            document.getElementById("scratchFullscreen").classList.add("active");
            document.body.style.overflow = "hidden";
            
            scratchCanvasElem = document.getElementById("scratchCanvas");
            scratchCtx = scratchCanvasElem.getContext("2d", { willReadFrequently: true });
            await resizeCanvasAndDrawHardScratchLayer();
            window.addEventListener("resize", handleResize);
            attachScratchEventsWithCustomAudio();
            autoRevealed = false;
            scratchCanvasElem.style.opacity = "1";
            scratchCanvasElem.style.display = "block";
            if (fadeTimeout) clearTimeout(fadeTimeout);
        }

        function handleResize() { 
            if (document.getElementById("scratchFullscreen").classList.contains("active")) 
                resizeCanvasAndDrawHardScratchLayer(); 
        }

        async function resizeCanvasAndDrawHardScratchLayer() {
            if (!scratchCanvasElem || !scratchCtx) return;
            const container = document.querySelector(".scratch-inner");
            const rect = container.getBoundingClientRect();
            scratchCanvasElem.width = rect.width;
            scratchCanvasElem.height = rect.height;
            scratchCanvasElem.style.width = `${rect.width}px`;
            scratchCanvasElem.style.height = `${rect.height}px`;
            
            const grad = scratchCtx.createLinearGradient(0, 0, scratchCanvasElem.width, scratchCanvasElem.height);
            grad.addColorStop(0, "#4a3922");
            grad.addColorStop(0.5, "#6e5436");
            grad.addColorStop(1, "#3e2c1a");
            scratchCtx.fillStyle = grad;
            scratchCtx.fillRect(0, 0, scratchCanvasElem.width, scratchCanvasElem.height);
            
            for (let i = 0; i < 5000; i++) {
                scratchCtx.fillStyle = `rgba(180, 150, 100, ${Math.random() * 0.5})`;
                scratchCtx.beginPath();
                scratchCtx.arc(Math.random() * scratchCanvasElem.width, Math.random() * scratchCanvasElem.height, Math.random() * 7 + 1, 0, Math.PI * 2);
                scratchCtx.fill();
            }
            scratchCtx.beginPath();
            scratchCtx.strokeStyle = "rgba(100, 70, 40, 0.7)";
            scratchCtx.lineWidth = 2.5;
            for (let i = 0; i < 300; i++) {
                scratchCtx.beginPath();
                scratchCtx.moveTo(Math.random() * scratchCanvasElem.width, Math.random() * scratchCanvasElem.height);
                scratchCtx.lineTo(Math.random() * scratchCanvasElem.width, Math.random() * scratchCanvasElem.height);
                scratchCtx.stroke();
            }
            for (let s = 0; s < 1800; s++) {
                scratchCtx.fillStyle = `rgba(210, 170, 100, ${Math.random() * 0.45})`;
                scratchCtx.fillRect(Math.random() * scratchCanvasElem.width, Math.random() * scratchCanvasElem.height, Math.random() * 12 + 2, Math.random() * 12 + 2);
            }
            scratchCtx.globalCompositeOperation = "source-over";
        }

        // EVENTOS DE RASPA CON AUDIO DEL ARCHIVO 0424.MP3 (SOLO AL PRESIONAR Y ARRASTRAR)
        function attachScratchEventsWithCustomAudio() {
            if (!scratchCanvasElem) return;
            const getCoords = (e) => {
                const rect = scratchCanvasElem.getBoundingClientRect();
                const scaleX = scratchCanvasElem.width / rect.width;
                const scaleY = scratchCanvasElem.height / rect.height;
                let cx, cy;
                if (e.touches) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
                else { cx = e.clientX; cy = e.clientY; }
                let x = (cx - rect.left) * scaleX;
                let y = (cy - rect.top) * scaleY;
                x = Math.min(Math.max(0, x), scratchCanvasElem.width);
                y = Math.min(Math.max(0, y), scratchCanvasElem.height);
                return { x, y };
            };
            
            const scratchAction = (e) => {
                if (!scratchCtx || autoRevealed) return;
                e.preventDefault();
                const { x, y } = getCoords(e);
                scratchCtx.globalCompositeOperation = "destination-out";
                scratchCtx.beginPath();
                scratchCtx.arc(x, y, 18, 0, Math.PI * 2);
                scratchCtx.fill();
                scratchCtx.globalCompositeOperation = "source-over";
                checkScratchProgressAndReveal();
            };
            
            const startDraw = async (e) => {
                if (!autoRevealed) {
                    // Desbloquear audio y reproducir (SOLO AL MANTENER PRESIONADO)
                    await unlockAudioOnFirstInteraction();
                    if (customAudioContext && customAudioBuffer) {
                        startScratchCustomSound();
                    } else {
                        // Intentar cargar el audio si aún no está listo
                        await initCustomScratchAudio();
                        if (customAudioBuffer) startScratchCustomSound();
                    }
                    isDrawing = true;
                    scratchAction(e);
                }
            };
            const stopDraw = () => {
                if (isDrawing) {
                    isDrawing = false;
                    stopScratchCustomSound();  // DETIENE SONIDO AL SOLTAR EL CLIC/DEDO
                }
            };
            const moveDraw = (e) => { if (isDrawing && !autoRevealed) scratchAction(e); };
            
            scratchCanvasElem.addEventListener("mousedown", startDraw);
            window.addEventListener("mousemove", moveDraw);
            window.addEventListener("mouseup", stopDraw);
            scratchCanvasElem.addEventListener("touchstart", startDraw);
            window.addEventListener("touchmove", moveDraw);
            window.addEventListener("touchend", stopDraw);
            scratchCanvasElem._handlers = { startDraw, moveDraw, stopDraw };
        }

        function checkScratchProgressAndReveal() {
            if (!scratchCtx || autoRevealed) return;
            const w = scratchCanvasElem.width, h = scratchCanvasElem.height;
            if (w === 0 || h === 0) return;
            let cleared = 0, total = 0;
            const step = 24;
            for (let y = 0; y < h; y += step) {
                for (let x = 0; x < w; x += step) {
                    const px = scratchCtx.getImageData(x, y, 1, 1).data;
                    if (px[3] === 0) cleared++;
                    total++;
                }
            }
            const ratio = total > 0 ? cleared / total : 0;
            if (ratio >= 0.72 && !autoRevealed) {
                autoRevealed = true;
                const numDiv = document.getElementById("prizeNumberDisplay");
                numDiv.style.transition = "filter 0.8s, opacity 0.8s";
                numDiv.style.opacity = "1";
                numDiv.style.filter = "blur(0px)";
                scratchCanvasElem.style.transition = "opacity 1s ease-out";
                scratchCanvasElem.style.opacity = "0";
                fadeTimeout = setTimeout(() => { if (scratchCanvasElem) scratchCanvasElem.style.display = "none"; }, 1000);
                stopScratchCustomSound();  // Detener sonido si se completa el raspado
            } else if (ratio > 0.35) {
                const numDiv = document.getElementById("prizeNumberDisplay");
                const newOpacity = Math.min(0.35 + ratio * 0.65, 1);
                const newBlur = Math.max(0, 8 - ratio * 11);
                numDiv.style.opacity = newOpacity.toString();
                numDiv.style.filter = `blur(${newBlur}px)`;
            }
        }

        function cleanupScratchEvents() {
            if (!scratchCanvasElem) return;
            const h = scratchCanvasElem._handlers;
            if (h) {
                scratchCanvasElem.removeEventListener("mousedown", h.startDraw);
                window.removeEventListener("mousemove", h.moveDraw);
                window.removeEventListener("mouseup", h.stopDraw);
                scratchCanvasElem.removeEventListener("touchstart", h.startDraw);
                window.removeEventListener("touchmove", h.moveDraw);
                window.removeEventListener("touchend", h.stopDraw);
            }
            window.removeEventListener("resize", handleResize);
            stopScratchCustomSound(); // Asegurar que el sonido se detiene
        }

        async function closeScratchAndSave() {
            if (currentScratchCardIndex !== null && !flippedState[currentScratchCardIndex] && !isTodayFlipUsed()) {
                if (canMakeAttempt()) {
                    consumeAttempt();
                    flippedState[currentScratchCardIndex] = true;
                    lastFlipDate = getTodayDate();
                    lastFlippedIndex = currentScratchCardIndex;
                    saveToLocalStorage();
                    showCustomMessage(`🎉 ¡Descubriste el número ${cardNumbers[currentScratchCardIndex]}!`, false);
                } else {
                    showCustomMessage("No quedan intentos, carta no desbloqueada.", true);
                }
            }
            cleanupScratchEvents();
            document.getElementById("scratchFullscreen").classList.remove("active");
            document.getElementById("gameHeader").classList.remove("header-hidden");
            document.body.style.overflow = "";
            if (scratchCanvasElem) {
                scratchCanvasElem.style.opacity = "1";
                scratchCanvasElem.style.display = "block";
            }
            currentScratchCardIndex = null;
            renderBoard();
            updateAttemptsDisplay();
        }

        function onConfirmChoice() {
            if (pendingCardIdx === null) return;
            const idx = pendingCardIdx;
            closeConfirmModal();
            if (flippedState[idx] || isTodayFlipUsed() || !canMakeAttempt()) {
                showCustomMessage("No puedes elegir esta carta ahora.", true);
                return;
            }
            startScratchExperience(idx);
        }
        function onCancelChoice() { closeConfirmModal(); }

        function updateCountdownDisplay() {
            const now = new Date();
            const midnight = new Date(now);
            midnight.setHours(24,0,0,0);
            const diff = midnight - now;
            if (diff <= 0) {
                document.getElementById("countdownTimer").innerHTML = "✨ Nuevo día ✨";
                if (lastFlipDate !== getTodayDate()) { loadAttempts(); renderBoard(); }
                return;
            }
            const h = Math.floor(diff/3600000);
            const m = Math.floor((diff%3600000)/60000);
            const s = Math.floor((diff%60000)/1000);
            document.getElementById("countdownTimer").innerHTML = `⏳ próximo: ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        let lastDateCheck = getTodayDate();
        function checkDateReset() {
            const today = getTodayDate();
            if (today !== lastDateCheck) {
                lastDateCheck = today;
                loadFromLocalStorage();
                loadAttempts();
                renderBoard();
            }
        }

        let shuffleInterval;
        function startShuffle() {
            if (shuffleInterval) clearInterval(shuffleInterval);
            shuffleInterval = setInterval(() => {
                if (!document.getElementById("scratchFullscreen").classList.contains("active") && !isGameComplete()) {
                    const cards = document.querySelectorAll('.card:not(.flipped)');
                    cards.forEach(c => {
                        c.style.animation = "elegantShuffle 0.6s ease-in-out forwards";
                        setTimeout(() => c.style.animation = "", 650);
                    });
                }
            }, 30000);
        }

        document.getElementById("confirmYesBtn").addEventListener("click", onConfirmChoice);
        document.getElementById("confirmNoBtn").addEventListener("click", onCancelChoice);
        document.getElementById("closeScratchBtn").addEventListener("click", () => closeScratchAndSave());

        async function init() {
            // Precargar el audio 0424.MP3 (sin reproducir aún)
            await initCustomScratchAudio();
            loadFromLocalStorage();
            loadAttempts();
            if (!cardNumbers || cardNumbers.length !== TOTAL_CARDS) initializeFreshGame();
            if (!flippedState || flippedState.length !== TOTAL_CARDS) flippedState = new Array(TOTAL_CARDS).fill(false);
            renderBoard();
            startShuffle();
            setInterval(() => { updateCountdownDisplay(); checkDateReset(); }, 1000);
        }
        init();
    </script>
</body>
</html>
