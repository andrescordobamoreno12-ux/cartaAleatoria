<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Giro Mágico - Cartas Misteriosas</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', 'Poppins', 'Roboto', system-ui, sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        /* IMAGEN DE FONDO ANIMADA */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('1.jfif') center/cover no-repeat;
            background-size: cover;
            background-attachment: fixed;
            opacity: 0.9;
            z-index: -2;
            pointer-events: none;
        }

        /* Gradiente de superposición para mejorar legibilidad */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.6));
            z-index: -1;
            pointer-events: none;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            padding: 1rem 1.5rem 1.5rem 1.5rem;
            overflow: hidden;
        }

        /* PANEL DE ESTADOS */
        .stats-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 3rem;
            padding: 0.7rem 1.8rem;
            margin-bottom: 1.5rem;
            color: #fff3e0;
            gap: 14px;
            box-shadow: 0 12px 25px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            border: 1px solid rgba(255,215,130,0.5);
            flex-shrink: 0;
            z-index: 10;
        }

        .info-card {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 2rem;
            padding: 0.4rem 1.2rem;
            font-weight: bold;
            display: flex;
            align-items: baseline;
            gap: 10px;
            backdrop-filter: blur(4px);
            border: 1px solid #ffcf7a;
        }

        .info-card span:first-child {
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 500;
            color: #ffdd99;
        }

        .info-card .value {
            font-size: 1.8rem;
            font-weight: 800;
            color: #ffdfaa;
            text-shadow: 0 2px 5px #b45f1b;
            line-height: 1;
        }

        .message-area {
            background: rgba(0, 0, 0, 0.75);
            border-radius: 3rem;
            padding: 0.7rem 1.5rem;
            font-weight: bold;
            font-size: 0.95rem;
            flex: 2;
            text-align: center;
            letter-spacing: 0.3px;
            border-left: 5px solid #ffb347;
            backdrop-filter: blur(8px);
            font-weight: 600;
            color: #ffefcd;
        }

        .countdown-box {
            background: rgba(0, 0, 0, 0.7);
            padding: 0.5rem 1.2rem;
            border-radius: 2.5rem;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 1.05rem;
            color: #ffdd99;
            backdrop-filter: blur(5px);
            border: 1px solid #f3b15a;
            letter-spacing: 1px;
        }

        /* GRID DE CARTAS */
        .cards-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            padding: 0.5rem;
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            position: relative;
        }

        /* DISEÑO DE CARTAS CON IMAGEN */
        .card {
            width: 100%;
            max-width: 135px;
            min-width: 100px;
            flex: 1 1 auto;
            aspect-ratio: 3 / 4;
            background: url('cttro_ 🛵.jfif') center/cover no-repeat;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 16px 20px -8px rgba(0, 0, 0, 0.6), inset 0 1px 2px rgba(255,255,240,0.3);
            border: 2px solid rgba(255, 215, 120, 0.9);
            transform: translateY(-3px);
            position: relative;
        }

        /* Efecto de brillo en las cartas */
        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 20px;
            background: radial-gradient(circle at 30% 25%, rgba(255,245,200,0.2), transparent);
            pointer-events: none;
        }

        .card:active {
            transform: translateY(4px);
            box-shadow: 0 8px 12px -4px black;
        }

        /* ANIMACIÓN DE BARAJADO */
        .card.shuffle-animation {
            animation: whirlwindShuffle 0.7s cubic-bezier(0.2, 0.9, 0.6, 1.2) forwards;
        }

        @keyframes whirlwindShuffle {
            0% {
                transform: rotate(0deg) translateY(0px) scale(0.7);
                filter: blur(6px);
                opacity: 0.3;
            }
            30% {
                transform: rotate(110deg) translateX(-35px) translateY(-30px) scale(0.85);
                filter: blur(3px);
                opacity: 0.7;
            }
            70% {
                transform: rotate(250deg) translateX(25px) translateY(-20px) scale(0.95);
                filter: blur(1px);
                opacity: 0.9;
            }
            100% {
                transform: rotate(360deg) translateX(0) translateY(0) scale(1);
                filter: blur(0);
                opacity: 1;
            }
        }

        /* CARTA VOLTEADA (abierta) - mantiene la imagen pero con overlay */
        .card.flipped {
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.4);
            transform: translateY(0px);
            cursor: default;
            position: relative;
        }

        .card.flipped::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            pointer-events: none;
        }

        .card.flipped.shuffle-animation {
            animation: none !important;
            transform: translateY(0px) !important;
        }

        /* Símbolo "?" sobre la imagen (cartas cerradas) */
        .card:not(.flipped)::after {
            content: "?";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.8rem;
            font-weight: bold;
            color: #FFD966;
            text-shadow: 3px 3px 0 #7a3f1a;
            background: rgba(0, 0, 0, 0.5);
            width: 65px;
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            backdrop-filter: blur(3px);
            font-family: monospace;
            pointer-events: none;
        }

        .card:not(.flipped) span {
            display: none;
        }

        .card.flipped span {
            display: block;
            animation: flipContentPop 0.25s ease-out;
            font-weight: 800;
            z-index: 2;
            position: relative;
            font-size: 2.8rem;
            color: white;
            text-shadow: 2px 2px 8px black;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 15px;
            border-radius: 50px;
            letter-spacing: 2px;
        }

        @keyframes flipContentPop {
            0% { transform: scale(0.1) rotate(-12deg); opacity: 0; }
            80% { transform: scale(1.2); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 680px) {
            .cards-grid { gap: 1rem; }
            .card { max-width: 105px; min-width: 80px; }
            .card:not(.flipped)::after { font-size: 2rem; width: 50px; height: 50px; }
            .card.flipped span { font-size: 2rem; padding: 5px 12px; }
            .stats-panel { flex-direction: column; align-items: stretch; padding: 0.8rem 1.2rem; }
            .info-card .value { font-size: 1.4rem; }
        }

        @media (max-width: 480px) {
            .cards-grid { gap: 0.7rem; }
            .card { max-width: 85px; min-width: 70px; }
            .card.flipped span { font-size: 1.7rem; }
            .card:not(.flipped)::after { font-size: 1.6rem; width: 40px; height: 40px; }
        }

        /* Partículas mágicas */
        .shuffle-particle {
            position: fixed;
            pointer-events: none;
            z-index: 999;
            background: radial-gradient(circle, #ffd58c, #ffaa44);
            border-radius: 50%;
            animation: magicSpark 0.7s ease-out forwards;
        }

        @keyframes magicSpark {
            0% { transform: scale(0.2); opacity: 0.9; }
            100% { transform: scale(2.8); opacity: 0; }
        }

        .cards-grid::-webkit-scrollbar {
            width: 6px;
        }
        .cards-grid::-webkit-scrollbar-track {
            background: #2e241f60;
            border-radius: 10px;
        }
        .cards-grid::-webkit-scrollbar-thumb {
            background: #e5a452;
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="stats-panel">
        <div class="info-card">
            <span> Abiertas </span>
            <span class="value" id="openedCount">0</span>
            <span>/ 7</span>
        </div>
        <div class="info-card">
            <span> Restantes</span>
            <span class="value" id="remainingCount">7</span>
        </div>
        <div class="message-area" id="statusMessage">
             Te quedan 7 cartas restantes
        </div>
        <div class="countdown-box" id="countdownTimer">
            próximo giro: --
        </div>
    </div>

    <div class="cards-grid" id="cardsGrid"></div>
</div>

<script>
    // CONFIGURACIÓN: 7 cartas con números del 1 al 10 (sin repetir)
    const TOTAL_CARDS = 7;
    const NUMBER_POOL = 10;
    const STORAGE_NUMBERS = "magic7_cards_numbers";
    const STORAGE_FLIPPED = "magic7_cards_flipped";
    const STORAGE_LAST_DATE = "magic7_cards_lastDate";
    const STORAGE_LAST_CARD_IDX = "magic7_cards_lastIdx";

    let cardNumbers = [];
    let flippedState = [];
    let lastFlipDate = null;
    let lastFlippedIndex = -1;
    let shuffleInterval = null;

    const gridContainer = document.getElementById("cardsGrid");
    const openedCountSpan = document.getElementById("openedCount");
    const remainingCountSpan = document.getElementById("remainingCount");
    const statusMsgDiv = document.getElementById("statusMessage");
    const countdownSpan = document.getElementById("countdownTimer");

    function getTodayDate() {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}`;
    }

    function generateUniqueRandomNumbers(count, maxVal) {
        const available = Array.from({ length: maxVal }, (_, i) => i + 1);
        for (let i = available.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [available[i], available[j]] = [available[j], available[i]];
        }
        return available.slice(0, count);
    }

    function saveToLocalStorage() {
        localStorage.setItem(STORAGE_NUMBERS, JSON.stringify(cardNumbers));
        localStorage.setItem(STORAGE_FLIPPED, JSON.stringify(flippedState));
        if (lastFlipDate !== null) localStorage.setItem(STORAGE_LAST_DATE, lastFlipDate);
        else localStorage.removeItem(STORAGE_LAST_DATE);
        if (lastFlippedIndex !== -1) localStorage.setItem(STORAGE_LAST_CARD_IDX, JSON.stringify(lastFlippedIndex));
        else localStorage.removeItem(STORAGE_LAST_CARD_IDX);
    }

    function initializeFreshGame() {
        cardNumbers = generateUniqueRandomNumbers(TOTAL_CARDS, NUMBER_POOL);
        flippedState = new Array(TOTAL_CARDS).fill(false);
        lastFlipDate = null;
        lastFlippedIndex = -1;
        saveToLocalStorage();
    }

    function loadFromLocalStorage() {
        const storedNumbers = localStorage.getItem(STORAGE_NUMBERS);
        const storedFlipped = localStorage.getItem(STORAGE_FLIPPED);
        const storedDate = localStorage.getItem(STORAGE_LAST_DATE);
        const storedLastIdx = localStorage.getItem(STORAGE_LAST_CARD_IDX);

        if (storedNumbers && storedFlipped) {
            try {
                cardNumbers = JSON.parse(storedNumbers);
                flippedState = JSON.parse(storedFlipped);
                if (!Array.isArray(cardNumbers) || cardNumbers.length !== TOTAL_CARDS ||
                    !Array.isArray(flippedState) || flippedState.length !== TOTAL_CARDS) {
                    throw new Error("Corrupto");
                }
                const uniqueSet = new Set(cardNumbers);
                if (uniqueSet.size !== TOTAL_CARDS || cardNumbers.some(n => n < 1 || n > NUMBER_POOL)) {
                    throw new Error("Rango inválido");
                }
            } catch(e) {
                initializeFreshGame();
                return;
            }
            lastFlipDate = storedDate || null;
            lastFlippedIndex = (storedLastIdx !== null && storedLastIdx !== undefined) ? JSON.parse(storedLastIdx) : -1;
        } else {
            initializeFreshGame();
        }
    }

    function isGameComplete() {
        return flippedState.every(flipped => flipped === true);
    }

    function isTodayFlipUsed() {
        if (!lastFlipDate) return false;
        return lastFlipDate === getTodayDate();
    }

    function createShuffleParticles() {
        const cards = document.querySelectorAll('.card:not(.flipped)');
        if (cards.length === 0) return;
        const particleCount = Math.min(16, cards.length * 3);
        for (let i = 0; i < particleCount; i++) {
            const randomCard = cards[Math.floor(Math.random() * cards.length)];
            if (!randomCard) continue;
            const rect = randomCard.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2 + (Math.random() - 0.5) * 35;
            const centerY = rect.top + rect.height / 2 + (Math.random() - 0.5) * 30;
            const particle = document.createElement('div');
            particle.classList.add('shuffle-particle');
            particle.style.left = `${centerX - 6}px`;
            particle.style.top = `${centerY - 6}px`;
            particle.style.width = `${6 + Math.random() * 12}px`;
            particle.style.height = particle.style.width;
            particle.style.background = `radial-gradient(circle, #ffdd99, #ffb347, #ff8c42)`;
            document.body.appendChild(particle);
            setTimeout(() => particle.remove(), 600);
        }
    }

    function triggerShuffleAnimation() {
        const cards = document.querySelectorAll('.card');
        if (!cards.length) return;
        cards.forEach(card => {
            if (!card.classList.contains('flipped')) {
                card.classList.remove('shuffle-animation');
                void card.offsetWidth;
                card.classList.add('shuffle-animation');
            }
        });
        createShuffleParticles();
        setTimeout(() => {
            cards.forEach(card => {
                if (!card.classList.contains('flipped')) card.classList.remove('shuffle-animation');
            });
        }, 700);
    }

    function startPeriodicShuffle() {
        if (shuffleInterval) clearInterval(shuffleInterval);
        shuffleInterval = setInterval(() => {
            if (!isGameComplete()) {
                triggerShuffleAnimation();
            }
        }, 10000);
    }

    function createCardCelebration(cardIdx) {
        const cardsElements = document.querySelectorAll('.card');
        if (!cardsElements[cardIdx]) return;
        const rect = cardsElements[cardIdx].getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        for (let i = 0; i < 28; i++) {
            const particle = document.createElement('div');
            particle.classList.add('shuffle-particle');
            const angle = Math.random() * 2 * Math.PI;
            const rad = 30 + Math.random() * 70;
            const tx = Math.cos(angle) * rad;
            const ty = Math.sin(angle) * rad;
            particle.style.left = `${centerX - 5 + tx * 0.7}px`;
            particle.style.top = `${centerY - 5 + ty * 0.6}px`;
            particle.style.width = `${5 + Math.random() * 10}px`;
            particle.style.height = particle.style.width;
            particle.style.background = `radial-gradient(circle, #ffd966, #ffaa44, #f5a623)`;
            document.body.appendChild(particle);
            setTimeout(() => particle.remove(), 550);
        }
    }

    function triggerFireworksEffect() {
        for (let i = 0; i < 90; i++) {
            const particle = document.createElement('div');
            particle.classList.add('shuffle-particle');
            particle.style.position = 'fixed';
            particle.style.left = `${Math.random() * window.innerWidth}px`;
            particle.style.top = `${Math.random() * window.innerHeight}px`;
            particle.style.background = `radial-gradient(circle, #ffcc55, #ffaa33, #ff9933)`;
            particle.style.width = `${8 + Math.random() * 14}px`;
            particle.style.height = particle.style.width;
            particle.style.animation = `magicSpark 0.9s ease-out forwards`;
            document.body.appendChild(particle);
            setTimeout(() => particle.remove(), 900);
        }
    }

    function flipCard(cardIndex) {
        const today = getTodayDate();

        if (isGameComplete()) {
            statusMsgDiv.innerHTML = "🏆 ¡TESORO COMPLETO! Todas las cartas abiertas 🏆";
            return false;
        }

        if (flippedState[cardIndex]) {
            statusMsgDiv.innerHTML = `🔮 Carta #${cardIndex+1} ya está abierta (Número ${cardNumbers[cardIndex]}).`;
            return false;
        }

        if (isTodayFlipUsed()) {
            const lastNum = (lastFlippedIndex !== -1 && flippedState[lastFlippedIndex]) ? cardNumbers[lastFlippedIndex] : "?";
            statusMsgDiv.innerHTML = `⛔ Hoy ya usaste tu giro mágico. Vuelve mañana. (Última: N° ${lastNum})`;
            return false;
        }

        flippedState[cardIndex] = true;
        lastFlipDate = today;
        lastFlippedIndex = cardIndex;
        const revealedNumber = cardNumbers[cardIndex];
        saveToLocalStorage();

        createCardCelebration(cardIndex);
        statusMsgDiv.innerHTML = `🎉 ¡Giro exitoso! Número: ${revealedNumber} 🎉 Vuelve mañana.`;
        renderBoard();
        updateStatsAndMessage();

        if (isGameComplete()) {
            statusMsgDiv.innerHTML = "✨ ¡INCREÍBLE! Abriste las 7 cartas legendarias. ✨";
            triggerFireworksEffect();
        }
        return true;
    }

    function renderBoard() {
        if (!gridContainer) return;
        const totalFlipped = flippedState.filter(v => v === true).length;
        openedCountSpan.innerText = totalFlipped;
        remainingCountSpan.innerText = TOTAL_CARDS - totalFlipped;

        if (gridContainer.children.length === TOTAL_CARDS) {
            for (let i = 0; i < TOTAL_CARDS; i++) {
                const oldCard = gridContainer.children[i];
                const newCard = document.createElement("div");
                newCard.className = "card";
                if (flippedState[i]) {
                    newCard.classList.add("flipped");
                    const numberSpan = document.createElement("span");
                    numberSpan.innerText = cardNumbers[i];
                    newCard.appendChild(numberSpan);
                } else {
                    const hiddenSpan = document.createElement("span");
                    hiddenSpan.style.display = "none";
                    hiddenSpan.innerText = "?";
                    newCard.appendChild(hiddenSpan);
                }
                newCard.addEventListener("click", (function(idx) {
                    return function() { flipCard(idx); };
                })(i));
                gridContainer.replaceChild(newCard, oldCard);
            }
        } else {
            gridContainer.innerHTML = "";
            for (let i = 0; i < TOTAL_CARDS; i++) {
                const cardDiv = document.createElement("div");
                cardDiv.className = "card";
                if (flippedState[i]) {
                    cardDiv.classList.add("flipped");
                    const numberSpan = document.createElement("span");
                    numberSpan.innerText = cardNumbers[i];
                    cardDiv.appendChild(numberSpan);
                } else {
                    const hiddenSpan = document.createElement("span");
                    hiddenSpan.style.display = "none";
                    hiddenSpan.innerText = "?";
                    cardDiv.appendChild(hiddenSpan);
                }
                cardDiv.addEventListener("click", (function(idx) {
                    return function() { flipCard(idx); };
                })(i));
                gridContainer.appendChild(cardDiv);
            }
        }
        updateStatsAndMessage();
    }

    function updateStatsAndMessage() {
        const totalFlipped = flippedState.filter(v => v === true).length;
        openedCountSpan.innerText = totalFlipped;
        remainingCountSpan.innerText = TOTAL_CARDS - totalFlipped;
        const completed = isGameComplete();
        const usedToday = isTodayFlipUsed();

        if (completed) {
            statusMsgDiv.innerHTML = "🎯 ¡Colección Completa! 7/7 cartas reveladas 🎯";
            return;
        }
        if (usedToday) {
            const lastNum = (lastFlippedIndex !== -1 && flippedState[lastFlippedIndex]) ? cardNumbers[lastFlippedIndex] : "?";
            statusMsgDiv.innerHTML = `📅 Hoy ya usaste tu giro (N° ${lastNum}). Te faltan ${TOTAL_CARDS - totalFlipped} cartas.`;
        } else {
            statusMsgDiv.innerHTML = `Podes girar una carta, te quedan ${TOTAL_CARDS - totalFlipped} restantes`;
        }
    }

    function updateCountdownDisplay() {
        const now = new Date();
        const midnight = new Date(now);
        midnight.setHours(24, 0, 0, 0);
        const diffMs = midnight - now;
        if (diffMs <= 0) {
            countdownSpan.innerHTML = "🎲 ¡Nuevo giro disponible!";
            const todayStr = getTodayDate();
            if (lastFlipDate !== todayStr && !isGameComplete()) {
                if (!isTodayFlipUsed()) {
                    statusMsgDiv.innerHTML = `🌟 ¡La magia renueva! Gira una carta. 🌟`;
                }
                renderBoard();
            }
            return;
        }
        const hours = Math.floor(diffMs / (1000 * 60 * 60));
        const minutes = Math.floor((diffMs % (3600000)) / 60000);
        const seconds = Math.floor((diffMs % 60000) / 1000);
        countdownSpan.innerHTML = `Podes abrir la próxima carta en: ${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
    }

    let lastKnownDate = getTodayDate();
    function checkDateChangeAndRefresh() {
        const newDate = getTodayDate();
        if (newDate !== lastKnownDate) {
            lastKnownDate = newDate;
            loadFromLocalStorage();
            renderBoard();
            updateStatsAndMessage();
            if (!isTodayFlipUsed() && !isGameComplete()) {
                statusMsgDiv.innerHTML = "🌅 ¡Nuevo día mágico! Gira una carta ahora 🌅";
                setTimeout(() => triggerShuffleAnimation(), 300);
            }
        }
    }

    let countdownTimer = null;
    function startCountdownUpdater() {
        if (countdownTimer) clearInterval(countdownTimer);
        countdownTimer = setInterval(() => {
            updateCountdownDisplay();
            checkDateChangeAndRefresh();
        }, 1000);
    }

    function init() {
        loadFromLocalStorage();
        if (!cardNumbers || cardNumbers.length !== TOTAL_CARDS) {
            initializeFreshGame();
        }
        if (!flippedState || flippedState.length !== TOTAL_CARDS) {
            flippedState = new Array(TOTAL_CARDS).fill(false);
            saveToLocalStorage();
        }
        const uniqueCheck = new Set(cardNumbers);
        if (uniqueCheck.size !== TOTAL_CARDS || cardNumbers.some(n => n < 1 || n > NUMBER_POOL)) {
            cardNumbers = generateUniqueRandomNumbers(TOTAL_CARDS, NUMBER_POOL);
            saveToLocalStorage();
        }
        lastKnownDate = getTodayDate();
        renderBoard();
        startPeriodicShuffle();
        startCountdownUpdater();
        setTimeout(() => {
            triggerShuffleAnimation();
        }, 400);
    }

    window.addEventListener("beforeunload", () => {
        if (shuffleInterval) clearInterval(shuffleInterval);
        saveToLocalStorage();
    });
    
    document.addEventListener("DOMContentLoaded", init);
</script>
</body>
